<!DOCTYPE html>
<html>
<head>
<title>Invoice Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>💼 Freelance Invoice Generator</h1>

<input type="text" id="clientName" placeholder="Client Name">

<input type="email" id="clientEmail" placeholder="Client Email">

<button onclick="saveClient()">Save Client</button>

<button onclick="loadClient()">Load Client</button>

<table>
<thead>
<tr>
<th>Service</th>
<th>Qty</th>
<th>Rate</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="tableBody">
<tr>
<td><input class="service"></td>
<td><input class="qty" type="number" value="1"></td>
<td><input class="rate" type="number" value="0"></td>
<td class="amount">0</td>
</tr>
</tbody>
</table>

<button onclick="addRow()">Add Item</button>

<button onclick="calculate()">Calculate</button>

<h2>Total ₹ <span id="total">0</span></h2>

<button onclick="window.print()">Download PDF</button>

</div>

<script>

function addRow(){

const row=`
<tr>
<td><input class="service"></td>
<td><input class="qty" type="number" value="1"></td>
<td><input class="rate" type="number" value="0"></td>
<td class="amount">0</td>
</tr>
`;

document.getElementById("tableBody")
.insertAdjacentHTML("beforeend",row);

}

function calculate(){

let total=0;

document.querySelectorAll("#tableBody tr")
.forEach(row=>{

const qty=Number(
row.querySelector(".qty").value
);

const rate=Number(
row.querySelector(".rate").value
);

const amount=qty*rate;

row.querySelector(".amount").innerText=
amount;

total+=amount;

});

document.getElementById("total").innerText=
total;

}

async function saveClient(){

await fetch("/saveClient",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:document.getElementById("clientName").value,
email:document.getElementById("clientEmail").value
})
});

alert("Saved");

}

async function loadClient(){

const res=await fetch("/getClient");
const data=await res.json();

document.getElementById("clientName").value=data.name;
document.getElementById("clientEmail").value=data.email;

}

</script>

</body>
</html>
